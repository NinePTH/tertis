<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neon Blocks">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Tetris & Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            touch-action: none;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #f8fafc;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .font-epic { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .btn-modern {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            transition: all 0.15s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-modern:active {
            transform: scale(0.92);
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .btn-glow {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.8);
            transform: translateY(-2px);
        }

        canvas {
            background-color: #020617;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: box-shadow 0.2s;
        }

        .menu-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }
        .menu-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(124, 58, 237, 0.8);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }
    </style>
</head>
<body class="w-full h-[100dvh] flex flex-col items-center justify-center relative">

    <div id="main-menu" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-4 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPPHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbC1vcGFjaXR5PSIuMDUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=')]">
        <h1 class="text-4xl sm:text-6xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 font-epic mb-2 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)] text-center leading-tight">
            NEON<br>BLOCKS
        </h1>
        <p class="text-slate-400 mb-12 font-light tracking-wide text-sm sm:text-base text-center">เลือกโหมดที่คุณต้องการเล่น</p>
        
        <div class="flex flex-col gap-6 w-full max-w-xs">
            <button onclick="switchMode('tetris')" class="menu-btn glass-panel py-4 px-6 rounded-2xl flex flex-col items-center group">
                <span class="text-xl font-epic font-bold text-cyan-400 group-hover:text-white transition">CLASSIC TETRIS</span>
                <span class="text-xs text-slate-400 mt-1">บล็อกหล่นจากด้านบน</span>
            </button>
            <button onclick="switchMode('puzzle')" class="menu-btn glass-panel py-4 px-6 rounded-2xl flex flex-col items-center group">
                <span class="text-xl font-epic font-bold text-purple-400 group-hover:text-white transition">BLOCK PUZZLE</span>
                <span class="text-xs text-slate-400 mt-1">ลากวาง ระเบิดแนวตั้ง/นอน (8x8)</span>
            </button>
        </div>
    </div>

    <div id="tetris-view" class="hidden w-full max-w-md px-2 py-2 sm:px-4 sm:py-4 flex-col h-full relative">
        <div class="absolute top-2 left-2 sm:top-4 sm:left-4 z-10 flex gap-2">
            <button onclick="goToMenu()" class="w-8 h-8 rounded-full btn-modern flex items-center justify-center text-slate-300 hover:text-red-400">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7 7-7-7 7-7"/></svg>
            </button>
        </div>
        <div class="absolute top-2 right-2 sm:top-4 sm:right-4 z-10 flex gap-2">
            <button onclick="togglePause()" class="w-8 h-8 rounded-full btn-modern flex items-center justify-center text-slate-300 hover:text-cyan-400 shadow-lg">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
            </button>
        </div>

        <div class="text-center mb-1 sm:mb-2 mt-1 sm:mt-0">
            <h2 class="text-xl sm:text-2xl font-bold tracking-widest text-cyan-400 font-epic drop-shadow-md">TETRIS</h2>
        </div>

        <div class="grid grid-cols-3 w-full mb-1 sm:mb-2 px-1 gap-1 sm:gap-2">
            <div class="glass-panel px-1 py-1 rounded-xl text-center">
                <span class="block text-[9px] text-slate-400 font-epic tracking-wider">SCORE</span>
                <span id="tetris-score" class="text-lg font-bold text-cyan-400 font-epic">0</span>
            </div>
            <div class="glass-panel px-1 py-1 rounded-xl text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-orange-600/10 blur-xl"></div>
                <span class="block text-[9px] text-amber-300 font-epic relative z-10">BEST</span>
                <span id="tetris-highscore" class="text-lg font-bold text-amber-400 font-epic relative z-10">0</span>
            </div>
            <div class="glass-panel px-1 py-1 rounded-xl text-center">
                <span class="block text-[9px] text-slate-400 font-epic tracking-wider">LEVEL</span>
                <span id="tetris-level" class="text-lg font-bold text-indigo-400 font-epic">1</span>
            </div>
        </div>

        <div id="tetris-container" class="flex-1 w-full relative flex justify-center items-center my-1 min-h-0">
            <div id="tetris-wrapper" class="relative">
                <canvas id="tetris-canvas" width="200" height="400" class="w-full h-full block rounded-lg"></canvas>
                <div id="tetris-overlay" class="absolute inset-0 glass-panel rounded-lg flex flex-col items-center justify-center z-10 hidden" style="backdrop-filter: blur(5px);">
                    <div class="text-center px-4">
                        <h2 class="text-2xl font-epic font-bold text-red-500 mb-2">GAME OVER</h2>
                        <p id="tetris-msg" class="text-sm text-slate-300 mb-6">FINAL SCORE: <span class="text-cyan-400 font-bold">0</span></p>
                        <button onclick="startTetrisGame()" class="btn-glow px-6 py-2 rounded-full font-bold tracking-wide font-epic">RETRY</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-1 sm:gap-2 w-full mt-auto mb-1 px-1 md:hidden">
            <button id="btn-left" class="btn-modern h-12 rounded-xl flex items-center justify-center text-2xl"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
            <button id="btn-rotate" class="btn-modern h-12 rounded-xl flex items-center justify-center text-2xl"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button>
            <button id="btn-right" class="btn-modern h-12 rounded-xl flex items-center justify-center text-2xl"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
            <div class="col-span-3"><button id="btn-down" class="btn-modern h-12 w-full rounded-xl flex items-center justify-center text-lg tracking-widest font-epic">DROP</button></div>
        </div>
    </div>

    <div id="puzzle-view" class="hidden w-full max-w-md px-2 py-2 sm:px-4 sm:py-4 flex-col h-full relative">
        <div class="absolute top-2 left-2 sm:top-4 sm:left-4 z-10 flex gap-2">
            <button onclick="goToMenu()" class="w-8 h-8 rounded-full btn-modern flex items-center justify-center text-slate-300 hover:text-red-400">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7 7-7-7 7-7"/></svg>
            </button>
        </div>
        <div class="absolute top-2 right-2 sm:top-4 sm:right-4 z-10 flex gap-2">
            <button onclick="togglePause()" class="w-8 h-8 rounded-full btn-modern flex items-center justify-center text-slate-300 hover:text-cyan-400 shadow-lg">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
            </button>
        </div>

        <div class="text-center mb-1 sm:mb-2 mt-1 sm:mt-0">
            <h2 class="text-xl sm:text-2xl font-bold tracking-widest text-purple-400 font-epic drop-shadow-md">PUZZLE</h2>
        </div>

        <div class="grid grid-cols-2 w-full mb-1 sm:mb-2 px-1 gap-1 sm:gap-2">
            <div class="glass-panel px-1 py-1 sm:py-2 rounded-xl text-center">
                <span class="block text-[10px] text-slate-400 font-epic tracking-wider">SCORE</span>
                <span id="puzzle-score" class="text-xl font-bold text-cyan-400 font-epic">0</span>
            </div>
            <div class="glass-panel px-1 py-1 sm:py-2 rounded-xl text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-orange-600/10 blur-xl"></div>
                <span class="block text-[10px] text-amber-300 font-epic tracking-wider relative z-10">BEST</span>
                <span id="puzzle-highscore" class="text-xl font-bold text-amber-400 font-epic relative z-10">0</span>
            </div>
        </div>

        <div id="puzzle-container" class="flex-1 w-full relative flex justify-center items-center my-1 min-h-0">
            <div id="puzzle-wrapper" class="relative">
                <canvas id="puzzle-canvas" width="200" height="300" class="w-full h-full block rounded-lg bg-[#020617] shadow-[0_0_20px_rgba(99,102,241,0.2)] border border-[#6366f14d] transition-shadow duration-200"></canvas>
                
                <div id="puzzle-overlay" class="absolute inset-0 glass-panel rounded-lg flex flex-col items-center justify-center z-10 hidden" style="backdrop-filter: blur(5px);">
                    <div class="text-center px-4">
                        <h2 class="text-2xl font-epic font-bold text-red-500 mb-2">OUT OF MOVES</h2>
                        <p id="puzzle-msg" class="text-sm text-slate-300 mb-6">FINAL SCORE: <span class="text-purple-400 font-bold">0</span></p>
                        <button onclick="startPuzzleGame()" class="btn-glow px-6 py-2 rounded-full font-bold tracking-wide font-epic">RETRY</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="h-4 w-full md:hidden"></div>
    </div>

    <div id="pause-overlay" class="hidden fixed inset-0 z-[60] flex-col items-center justify-center px-4" style="backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.7);">
        <div class="glass-panel w-full max-w-[240px] rounded-2xl p-6 flex flex-col items-center border border-cyan-500/30 text-center shadow-2xl">
            <h2 class="text-3xl font-epic font-bold text-cyan-400 mb-6 tracking-widest animate-pulse">PAUSED</h2>
            <div class="flex flex-col gap-3 w-full">
                <button onclick="togglePause()" class="btn-glow w-full py-3 rounded-full font-bold tracking-wide font-epic">RESUME</button>
                <button onclick="restartCurrentGame()" class="btn-modern w-full py-3 rounded-full font-bold tracking-wide font-epic text-red-400 hover:bg-red-500/20">RESTART</button>
                <button onclick="goToMenu()" class="btn-modern w-full py-3 rounded-full font-bold tracking-wide font-epic text-slate-400 mt-2">MAIN MENU</button>
            </div>
        </div>
    </div>

    <script>
        // ================= AUDIO SYSTEM =================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playNoise(duration, vol = 0.2) {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            noise.connect(gain); gain.connect(audioCtx.destination); noise.start();
        }

        const sfx = {
            move: () => playTone(300, 'sine', 0.05, 0.08),
            rotate: () => playTone(450, 'square', 0.05, 0.03),
            drop: () => playTone(150, 'sawtooth', 0.1, 0.1),
            place: () => playTone(200, 'sine', 0.1, 0.15),
            clear: () => {
                playTone(440, 'square', 0.1, 0.1); 
                setTimeout(() => playTone(554, 'square', 0.1, 0.1), 50); 
                setTimeout(() => playTone(659, 'square', 0.1, 0.1), 100);
                setTimeout(() => playTone(880, 'sine', 0.4, 0.15), 150); 
                playNoise(0.15, 0.05);
            },
            gameover: () => {
                playTone(300, 'sawtooth', 0.3, 0.1);
                setTimeout(() => playTone(250, 'sawtooth', 0.3, 0.1), 200);
                setTimeout(() => playTone(200, 'sawtooth', 0.6, 0.1), 400);
            }
        };

        // ================= GLOBAL STATE & UTILS =================
        let currentMode = 'menu';
        let isPaused = false;
        const colors = [null, '#06b6d4', '#3b82f6', '#f97316', '#eab308', '#22c55e', '#a855f7', '#ef4444', '#ec4899', '#14b8a6'];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        // Shared Effect Systems
        let particles = [];
        let floatingTexts = [];
        let shakeAmount = 0;
        let activeCanvas = null;

        function spawnParticles(x, y, colorIndex) {
            const color = colors[colorIndex] || '#ffffff';
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: x + 0.5 + (Math.random() - 0.5), y: y + 0.5 + (Math.random() - 0.5),
                    vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6 - 0.1,
                    life: 1.0 + Math.random() * 0.5, color: color, size: Math.random() * 0.25 + 0.05
                });
            }
        }

        function updateSharedEffects() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.01; p.life -= 0.04;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].life--; floatingTexts[i].y -= 0.02;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }
            if (shakeAmount > 0 && activeCanvas) {
                activeCanvas.style.transform = `translate(${(Math.random() - 0.5) * shakeAmount}px, ${(Math.random() - 0.5) * shakeAmount}px)`;
                shakeAmount *= 0.8;
                if(shakeAmount < 0.5) { shakeAmount = 0; activeCanvas.style.transform = `translate(0px, 0px)`; }
            }
        }

        function drawSharedEffects(ctx) {
            particles.forEach(p => {
                ctx.globalAlpha = p.life > 1 ? 1 : p.life;
                ctx.fillStyle = p.color; ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;

            floatingTexts.forEach(ft => {
                ctx.save();
                ctx.globalAlpha = ft.life / ft.maxLife;
                ctx.fillStyle = ft.color || '#67e8f9'; ctx.shadowBlur = 5; ctx.shadowColor = '#0891b2';
                ctx.font = "bold 1px 'Orbitron', sans-serif"; ctx.textAlign = "center";
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.lineWidth = 0.05; ctx.strokeStyle = 'white'; ctx.strokeText(ft.text, ft.x, ft.y);
                ctx.restore();
            });
        }

        // ================= UI NAVIGATION =================
        function switchMode(mode) {
            initAudio();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('tetris-view').classList.add('hidden');
            document.getElementById('puzzle-view').classList.add('hidden');

            currentMode = mode;
            isPaused = false;
            
            if (mode === 'tetris') {
                document.getElementById('tetris-view').classList.remove('hidden');
                document.getElementById('tetris-view').classList.add('flex');
                activeCanvas = document.getElementById('tetris-canvas');
                resizeCanvases();
                startTetrisGame();
            } else if (mode === 'puzzle') {
                document.getElementById('puzzle-view').classList.remove('hidden');
                document.getElementById('puzzle-view').classList.add('flex');
                activeCanvas = document.getElementById('puzzle-canvas');
                resizeCanvases();
                startPuzzleGame();
            }
        }

        function goToMenu() {
            isPaused = true;
            document.getElementById('pause-overlay').classList.add('hidden');
            document.getElementById('pause-overlay').classList.remove('flex');
            
            document.getElementById('tetris-view').classList.add('hidden');
            document.getElementById('tetris-view').classList.remove('flex');
            document.getElementById('puzzle-view').classList.add('hidden');
            document.getElementById('puzzle-view').classList.remove('flex');
            
            document.getElementById('main-menu').classList.remove('hidden');
            currentMode = 'menu';
        }

        function togglePause() {
            if (currentMode === 'menu' || (currentMode==='tetris' && tetrisGameOver) || (currentMode==='puzzle' && puzzleGameOver)) return;
            isPaused = !isPaused;
            const overlay = document.getElementById('pause-overlay');
            if (isPaused) {
                overlay.classList.remove('hidden'); overlay.classList.add('flex');
            } else {
                overlay.classList.add('hidden'); overlay.classList.remove('flex');
                if (currentMode === 'tetris') { tetrisLastTime = performance.now(); requestAnimationFrame(updateTetris); }
                if (currentMode === 'puzzle') { requestAnimationFrame(updatePuzzle); }
            }
        }

        function restartCurrentGame() {
            togglePause();
            if (currentMode === 'tetris') startTetrisGame();
            if (currentMode === 'puzzle') startPuzzleGame();
        }

        function resizeCanvases() {
            if (currentMode === 'tetris') {
                const wrapper = document.getElementById('tetris-wrapper');
                const container = document.getElementById('tetris-container');
                const scale = Math.min(container.clientWidth / 10, container.clientHeight / 20);
                wrapper.style.width = (scale * 10) + 'px'; wrapper.style.height = (scale * 20) + 'px';
            } else if (currentMode === 'puzzle') {
                const wrapper = document.getElementById('puzzle-wrapper');
                const container = document.getElementById('puzzle-container');
                // Puzzle 8x8 Board + 4 blocks for tray = 8:12 Ratio
                const scale = Math.min(container.clientWidth / 8, container.clientHeight / 12);
                wrapper.style.width = (scale * 8) + 'px'; wrapper.style.height = (scale * 12) + 'px';
            }
        }
        window.addEventListener('resize', resizeCanvases);

        // ================= TETRIS LOGIC =================
        const tetrisCanvas = document.getElementById('tetris-canvas');
        const tetrisCtx = tetrisCanvas.getContext('2d');
        tetrisCtx.scale(20, 20); 
        
        let tetrisArena = createMatrix(10, 20);
        let tetrisPlayer = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        let tetrisHighScore = localStorage.getItem('tetrisHighScore') || 0;
        document.getElementById('tetris-highscore').innerText = tetrisHighScore;
        
        let tetrisDropCounter = 0; let tetrisDropInterval = 1000;
        let tetrisLastTime = 0; let tetrisGameOver = true; let tetrisAnimId = null;

        function createTetrisPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'J') return [[0,2,0],[0,2,0],[2,2,0]];
            if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'S') return [[0,5,5],[5,5,0],[0,0,0]];
            if (type === 'T') return [[0,6,0],[6,6,6],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        function drawBlock(ctx, x, y, value, isGhost = false) {
            if (value === 0) return;
            ctx.fillStyle = isGhost ? '#ffffff' : colors[value];
            ctx.fillRect(x, y, 1, 1);
            if (!isGhost) {
                ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(x, y, 1, 0.1); ctx.fillRect(x, y, 0.1, 1);
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x, y + 0.9, 1, 0.1); ctx.fillRect(x + 0.9, y, 0.1, 1);
            }
        }

        function drawTetrisMatrix(matrix, offset, isGhost=false) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if(value !== 0) drawBlock(tetrisCtx, x + offset.x, y + offset.y, value, isGhost);
                });
            });
        }

        function tetrisCollide(arena, player) {
            const m = player.matrix; const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function tetrisMerge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function tetrisReset() {
            const pieces = 'IJLOSZT';
            tetrisPlayer.matrix = createTetrisPiece(pieces[pieces.length * Math.random() | 0]);
            tetrisPlayer.pos.y = 0; tetrisPlayer.pos.x = (tetrisArena[0].length / 2 | 0) - (tetrisPlayer.matrix[0].length / 2 | 0);
            if (tetrisCollide(tetrisArena, tetrisPlayer)) {
                tetrisGameOver = true;
                sfx.gameover();
                document.getElementById('tetris-overlay').classList.remove('hidden');
                document.querySelector('#tetris-msg span').innerText = tetrisPlayer.score;
            }
        }

        function tetrisSweep() {
            let rowCount = 1; let linesCleared = 0; let scoreGained = 0; let textY = 0;
            outer: for (let y = tetrisArena.length - 1; y >= 0; --y) {
                for (let x = 0; x < tetrisArena[y].length; ++x) { if (tetrisArena[y][x] === 0) continue outer; }
                for(let x=0; x<10; x++) spawnParticles(x, y, tetrisArena[y][x]);
                
                linesCleared++; if (textY === 0) textY = y;
                const row = tetrisArena.splice(y, 1)[0].fill(0);
                tetrisArena.unshift(row); ++y;
                scoreGained += rowCount * 100; rowCount *= 2;
            }
            if(linesCleared > 0) {
                sfx.clear(); shakeAmount = 8; tetrisPlayer.score += scoreGained;
                const msgs = ["GOOD!", "GREAT!", "AWESOME!"];
                floatingTexts.push({ x: 5, y: textY, text: linesCleared >= 4 ? "TETRIS! +" + scoreGained : msgs[linesCleared-1] + " +" + scoreGained, life: 60, maxLife: 60 });
            }
        }

        function updateTetrisScore() {
            document.getElementById('tetris-score').innerText = tetrisPlayer.score;
            if (tetrisPlayer.score > tetrisHighScore) {
                tetrisHighScore = tetrisPlayer.score; localStorage.setItem('tetrisHighScore', tetrisHighScore);
                document.getElementById('tetris-highscore').innerText = tetrisHighScore;
            }
            let lvl = Math.floor(tetrisPlayer.score / 500) + 1;
            document.getElementById('tetris-level').innerText = lvl;
            tetrisDropInterval = Math.max(100, 1000 - (lvl * 100));
        }

        function tetrisDrop() {
            tetrisPlayer.pos.y++;
            if (tetrisCollide(tetrisArena, tetrisPlayer)) {
                tetrisPlayer.pos.y--; tetrisMerge(tetrisArena, tetrisPlayer);
                sfx.drop(); shakeAmount = 2;
                tetrisReset(); tetrisSweep(); updateTetrisScore();
            }
            tetrisDropCounter = 0;
        }

        function tetrisMove(offset) {
            tetrisPlayer.pos.x += offset;
            if (tetrisCollide(tetrisArena, tetrisPlayer)) tetrisPlayer.pos.x -= offset;
            else sfx.move();
        }

        function tetrisRotate(dir) {
            const pos = tetrisPlayer.pos.x; let offset = 1;
            const matrix = tetrisPlayer.matrix;
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
            
            while (tetrisCollide(tetrisArena, tetrisPlayer)) {
                tetrisPlayer.pos.x += offset; offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > matrix[0].length) {
                    if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
                    for (let y = 0; y < matrix.length; ++y) {
                        for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                    }
                    tetrisPlayer.pos.x = pos; return;
                }
            }
            sfx.rotate();
        }

        function drawTetris() {
            tetrisCtx.fillStyle = '#020617'; tetrisCtx.fillRect(0, 0, 10, 20);
            tetrisCtx.lineWidth = 0.02; tetrisCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for(let i=0; i<=10; i++) { tetrisCtx.beginPath(); tetrisCtx.moveTo(i,0); tetrisCtx.lineTo(i,20); tetrisCtx.stroke(); }
            for(let i=0; i<=20; i++) { tetrisCtx.beginPath(); tetrisCtx.moveTo(0,i); tetrisCtx.lineTo(10,i); tetrisCtx.stroke(); }

            drawTetrisMatrix(tetrisArena, {x:0, y:0});
            if (tetrisPlayer.matrix && !tetrisGameOver) {
                const ghost = { matrix: tetrisPlayer.matrix, pos: { x: tetrisPlayer.pos.x, y: tetrisPlayer.pos.y } };
                while (!tetrisCollide(tetrisArena, ghost)) ghost.pos.y++;
                ghost.pos.y--;
                tetrisCtx.globalAlpha = 0.15; drawTetrisMatrix(ghost.matrix, ghost.pos, true); tetrisCtx.globalAlpha = 1.0;
                
                drawTetrisMatrix(tetrisPlayer.matrix, tetrisPlayer.pos);
            }
            drawSharedEffects(tetrisCtx);
        }

        function updateTetris(time = 0) {
            if (currentMode !== 'tetris' || isPaused) return;
            if (!tetrisGameOver) {
                const deltaTime = time - tetrisLastTime; tetrisLastTime = time;
                tetrisDropCounter += deltaTime;
                if (tetrisDropCounter > tetrisDropInterval) tetrisDrop();
            }
            updateSharedEffects(); drawTetris();
            tetrisAnimId = requestAnimationFrame(updateTetris);
        }

        function startTetrisGame() {
            if(tetrisAnimId) cancelAnimationFrame(tetrisAnimId);
            tetrisArena.forEach(row => row.fill(0));
            tetrisPlayer.score = 0; particles = []; floatingTexts = []; shakeAmount = 0; tetrisDropInterval = 1000;
            updateTetrisScore(); tetrisGameOver = false;
            document.getElementById('tetris-overlay').classList.add('hidden');
            tetrisReset(); tetrisLastTime = performance.now();
            updateTetris(tetrisLastTime);
        }

        let tetrisDownInterval;
        const startTetrisDrop = (e) => { e.preventDefault(); if(tetrisGameOver || isPaused || currentMode !== 'tetris') return; tetrisDrop(); clearInterval(tetrisDownInterval); tetrisDownInterval = setInterval(tetrisDrop, 80); };
        const stopTetrisDrop = () => clearInterval(tetrisDownInterval);

        const bindBtn = (id, action) => {
            const btn = document.getElementById(id);
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); action(); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, { passive: false });
        };
        bindBtn('btn-left', () => { if(!tetrisGameOver && !isPaused && currentMode==='tetris') tetrisMove(-1); });
        bindBtn('btn-right', () => { if(!tetrisGameOver && !isPaused && currentMode==='tetris') tetrisMove(1); });
        bindBtn('btn-rotate', () => { if(!tetrisGameOver && !isPaused && currentMode==='tetris') tetrisRotate(1); });
        
        const btnDown = document.getElementById('btn-down');
        btnDown.addEventListener('mousedown', startTetrisDrop); btnDown.addEventListener('touchstart', startTetrisDrop, { passive: false });
        window.addEventListener('mouseup', stopTetrisDrop); window.addEventListener('touchend', stopTetrisDrop);

        // ================= BLOCK PUZZLE LOGIC (8x8 Style) =================
        const puzzleCanvas = document.getElementById('puzzle-canvas');
        const pCtx = puzzleCanvas.getContext('2d');
        // สเกล = 25 เพราะขนาด 200x300 ให้เป็น logical 8x12 (Board 8x8 + 4 blocks below)
        pCtx.scale(25, 25); 
        
        let puzzleBoard = createMatrix(8, 8);
        let puzzleScore = 0;
        let puzzleHighScore = localStorage.getItem('puzzleHighScore') || 0;
        document.getElementById('puzzle-highscore').innerText = puzzleHighScore;
        let puzzleGameOver = true; let puzzleAnimId = null;

        // Shape definitions (เพิ่มโอกาสเกิดของบล็อกเล็กๆ ลงไปนิดเดียวตามที่ผู้ใช้ต้องการ)
        const puzzleShapes = [
            { m: [[1]], c: 1 }, { m: [[1]], c: 1 }, // 1x1 dot (+1 extra chance)
            { m: [[1,1]], c: 2 }, { m: [[1],[1]], c: 2 },
            { m: [[1,1]], c: 2 }, { m: [[1],[1]], c: 2 }, // 2x1, 1x2 (+1 extra pair chance)
            { m: [[1,1,1]], c: 3 }, { m: [[1],[1],[1]], c: 3 }, // 3x1, 1x3
            { m: [[1,1,1,1]], c: 4 }, { m: [[1],[1],[1],[1]], c: 4 }, // 4x1, 1x4
            { m: [[1,1,1,1,1]], c: 5 }, { m: [[1],[1],[1],[1],[1]], c: 5 }, // 5x1, 1x5
            { m: [[1,1],[1,1]], c: 6 }, { m: [[1,1],[1,1]], c: 6 }, // 2x2 square (+1 extra chance)
            { m: [[1,1,1],[1,1,1],[1,1,1]], c: 7 }, // 3x3 square
            { m: [[1,1],[1,0]], c: 8 }, { m: [[1,1],[0,1]], c: 8 }, { m: [[1,0],[1,1]], c: 8 }, { m: [[0,1],[1,1]], c: 8 }, // 2x2 Ls
            { m: [[1,1,1],[1,0,0],[1,0,0]], c: 9 }, { m: [[1,1,1],[0,0,1],[0,0,1]], c: 9 }, { m: [[1,0,0],[1,0,0],[1,1,1]], c: 9 }, { m: [[0,0,1],[0,0,1],[1,1,1]], c: 9 } // 3x3 Ls
        ];

        let trayPieces = [null, null, null]; 
        let draggingPiece = null; 

        function fillTray() {
            for(let i=0; i<3; i++) {
                if(!trayPieces[i]) trayPieces[i] = puzzleShapes[Math.floor(Math.random() * puzzleShapes.length)];
            }
            checkPuzzleGameOver();
        }

        function checkPuzzleFits(matrix, ox, oy) {
            for(let y=0; y<matrix.length; y++) {
                for(let x=0; x<matrix[0].length; x++) {
                    if (matrix[y][x]) {
                        if (oy+y < 0 || oy+y >= 8 || ox+x < 0 || ox+x >= 8) return false; 
                        if (puzzleBoard[oy+y][ox+x] !== 0) return false; 
                    }
                }
            }
            return true;
        }

        function checkPuzzleGameOver() {
            let canPlaceAny = false;
            let hasPieces = false;
            for(let i=0; i<3; i++) {
                if(trayPieces[i]) {
                    hasPieces = true;
                    let fits = false;
                    for(let y=0; y<8 && !fits; y++) {
                        for(let x=0; x<8 && !fits; x++) {
                            if (checkPuzzleFits(trayPieces[i].m, x, y)) fits = true;
                        }
                    }
                    if (fits) canPlaceAny = true;
                }
            }
            if (hasPieces && !canPlaceAny) {
                puzzleGameOver = true;
                sfx.gameover();
                document.getElementById('puzzle-overlay').classList.remove('hidden');
                document.querySelector('#puzzle-msg span').innerText = puzzleScore;
            }
        }

        function sweepPuzzleBoard() {
            let fullRows = []; let fullCols = [];
            for(let y=0; y<8; y++) {
                let isFull = true;
                for(let x=0; x<8; x++) if(puzzleBoard[y][x] === 0) isFull = false;
                if(isFull) fullRows.push(y);
            }
            for(let x=0; x<8; x++) {
                let isFull = true;
                for(let y=0; y<8; y++) if(puzzleBoard[y][x] === 0) isFull = false;
                if(isFull) fullCols.push(x);
            }

            let clearedCells = 0;
            fullRows.forEach(y => {
                for(let x=0; x<8; x++) {
                    if(puzzleBoard[y][x] !== 0) { spawnParticles(x, y, puzzleBoard[y][x]); puzzleBoard[y][x] = 0; clearedCells++; }
                }
            });
            fullCols.forEach(x => {
                for(let y=0; y<8; y++) {
                    if(puzzleBoard[y][x] !== 0) { spawnParticles(x, y, puzzleBoard[y][x]); puzzleBoard[y][x] = 0; clearedCells++; }
                }
            });

            if (clearedCells > 0) {
                sfx.clear(); shakeAmount = Math.min(10, clearedCells);
                let lines = fullRows.length + fullCols.length;
                let comboScore = lines * 100 + (lines > 1 ? lines * 50 : 0);
                puzzleScore += comboScore;
                floatingTexts.push({ x: 4, y: 4, text: (lines > 1 ? "COMBO! " : "CLEARED! ") + "+" + comboScore, life: 60, maxLife: 60, color: '#e879f9' });
                updatePuzzleScore();
            }
        }

        function updatePuzzleScore() {
            document.getElementById('puzzle-score').innerText = puzzleScore;
            if (puzzleScore > puzzleHighScore) {
                puzzleHighScore = puzzleScore; localStorage.setItem('puzzleHighScore', puzzleHighScore);
                document.getElementById('puzzle-highscore').innerText = puzzleHighScore;
            }
        }

        function drawPuzzleMatrix(ctx, matrix, colorIndex, offset, scale = 1.0, alpha = 1.0) {
            ctx.save();
            ctx.translate(offset.x, offset.y);
            ctx.scale(scale, scale);
            ctx.globalAlpha = alpha;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) drawBlock(ctx, x, y, colorIndex);
                });
            });
            ctx.restore();
        }

        function drawPuzzle() {
            pCtx.fillStyle = '#020617'; pCtx.fillRect(0, 0, 8, 12); 
            
            pCtx.lineWidth = 0.02; pCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for(let i=0; i<=8; i++) { pCtx.beginPath(); pCtx.moveTo(i,0); pCtx.lineTo(i,8); pCtx.stroke(); }
            for(let i=0; i<=8; i++) { pCtx.beginPath(); pCtx.moveTo(0,i); pCtx.lineTo(8,i); pCtx.stroke(); }
            
            pCtx.lineWidth = 0.05; pCtx.strokeStyle = 'rgba(99, 102, 241, 0.4)';
            pCtx.beginPath(); pCtx.moveTo(0, 8.2); pCtx.lineTo(8, 8.2); pCtx.stroke();

            for(let y=0; y<8; y++) {
                for(let x=0; x<8; x++) {
                    if (puzzleBoard[y][x] !== 0) drawBlock(pCtx, x, y, puzzleBoard[y][x]);
                }
            }

            const trayCenters = [1.33, 4.0, 6.66]; 
            const trayY = 10.0; 

            for(let i=0; i<3; i++) {
                if(trayPieces[i] && (!draggingPiece || draggingPiece.idx !== i)) {
                    let w = trayPieces[i].m[0].length; let h = trayPieces[i].m.length;
                    let scale = Math.min(2.0 / w, 2.0 / h, 0.6); 
                    drawPuzzleMatrix(pCtx, trayPieces[i].m, trayPieces[i].c, { x: trayCenters[i] - (w*scale/2), y: trayY - (h*scale/2) }, scale);
                }
            }

            if (draggingPiece) {
                let w = draggingPiece.m[0].length; let h = draggingPiece.m.length;
                let boardX = Math.round(draggingPiece.rx); let boardY = Math.round(draggingPiece.ry);
                
                if (boardY < 8) {
                    if (checkPuzzleFits(draggingPiece.m, boardX, boardY)) {
                        drawPuzzleMatrix(pCtx, draggingPiece.m, draggingPiece.c, {x: boardX, y: boardY}, 1.0, 0.3); 
                    }
                }
                
                drawPuzzleMatrix(pCtx, draggingPiece.m, draggingPiece.c, {x: draggingPiece.rx, y: draggingPiece.ry}, 1.0, 0.9);
            }

            drawSharedEffects(pCtx);
        }

        function updatePuzzle() {
            if (currentMode !== 'puzzle' || isPaused) return;
            updateSharedEffects(); drawPuzzle();
            puzzleAnimId = requestAnimationFrame(updatePuzzle);
        }

        function startPuzzleGame() {
            if(puzzleAnimId) cancelAnimationFrame(puzzleAnimId);
            puzzleBoard = createMatrix(8, 8);
            puzzleScore = 0; particles = []; floatingTexts = []; shakeAmount = 0;
            trayPieces = [null, null, null]; fillTray();
            updatePuzzleScore(); puzzleGameOver = false;
            document.getElementById('puzzle-overlay').classList.add('hidden');
            updatePuzzle();
        }

        function getPuzzlePointerPos(e) {
            const rect = puzzleCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: ((clientX - rect.left) / rect.width) * 8,
                y: ((clientY - rect.top) / rect.height) * 12
            };
        }

        function onPuzzlePointerDown(e) {
            if (currentMode !== 'puzzle' || puzzleGameOver || isPaused) return;
            e.preventDefault();
            const pos = getPuzzlePointerPos(e);
            const trayCenters = [1.33, 4.0, 6.66];
            
            if (pos.y > 8.5) {
                for(let i=0; i<3; i++) {
                    if (trayPieces[i] && Math.abs(pos.x - trayCenters[i]) < 1.5) {
                        sfx.move();
                        draggingPiece = {
                            idx: i, m: trayPieces[i].m, c: trayPieces[i].c,
                            rx: pos.x - (trayPieces[i].m[0].length/2), 
                            ry: pos.y - (trayPieces[i].m.length) - 1.5
                        };
                        break;
                    }
                }
            }
        }

        function onPuzzlePointerMove(e) {
            if (currentMode !== 'puzzle' || !draggingPiece || puzzleGameOver || isPaused) return;
            e.preventDefault();
            const pos = getPuzzlePointerPos(e);
            draggingPiece.rx = pos.x - (draggingPiece.m[0].length/2);
            draggingPiece.ry = pos.y - (draggingPiece.m.length) - 1.5;
        }

        function onPuzzlePointerUp(e) {
            if (currentMode !== 'puzzle' || !draggingPiece || puzzleGameOver || isPaused) return;
            e.preventDefault();
            
            let boardX = Math.round(draggingPiece.rx);
            let boardY = Math.round(draggingPiece.ry);

            if (checkPuzzleFits(draggingPiece.m, boardX, boardY)) {
                sfx.place();
                let blocksPlaced = 0;
                for(let y=0; y<draggingPiece.m.length; y++) {
                    for(let x=0; x<draggingPiece.m[0].length; x++) {
                        if (draggingPiece.m[y][x]) {
                            puzzleBoard[boardY+y][boardX+x] = draggingPiece.c;
                            blocksPlaced++;
                        }
                    }
                }
                puzzleScore += blocksPlaced * 10;
                updatePuzzleScore();
                trayPieces[draggingPiece.idx] = null; 
                sweepPuzzleBoard();
                
                if (!trayPieces[0] && !trayPieces[1] && !trayPieces[2]) fillTray();
                else checkPuzzleGameOver();
            }
            draggingPiece = null;
        }

        puzzleCanvas.addEventListener('mousedown', onPuzzlePointerDown); puzzleCanvas.addEventListener('touchstart', onPuzzlePointerDown, {passive: false});
        window.addEventListener('mousemove', onPuzzlePointerMove); window.addEventListener('touchmove', onPuzzlePointerMove, {passive: false});
        window.addEventListener('mouseup', onPuzzlePointerUp); window.addEventListener('touchend', onPuzzlePointerUp);

        // ================= GLOBAL KEYBOARD =================
        document.addEventListener('keydown', event => {
            if (event.keyCode === 80 || event.keyCode === 27) togglePause();
            if (currentMode === 'tetris' && !isPaused && !tetrisGameOver) {
                if (event.keyCode === 37) tetrisMove(-1);
                else if (event.keyCode === 39) tetrisMove(1);
                else if (event.keyCode === 40) tetrisDrop();
                else if (event.keyCode === 38) tetrisRotate(1);
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered!', reg))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
