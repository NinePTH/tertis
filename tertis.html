<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Tetris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            touch-action: none;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #f8fafc;
            overflow: hidden;
        }

        .font-epic {
            font-family: 'Orbitron', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* เอา Style ของ canvas ออกเพื่อไปใช้ Tailwind แทนในการจัดการ Responsive */

        .btn-modern {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn-modern:active {
            transform: scale(0.92);
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .btn-glow {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.8);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-[100dvh] overflow-hidden">

    <div class="w-full max-w-md px-2 py-2 sm:px-4 sm:py-4 flex flex-col h-full relative">
        <!-- Top Right Buttons -->
        <div class="absolute top-2 right-2 sm:top-4 sm:right-4 flex gap-2 z-10">
            <button id="pause-btn" class="w-8 h-8 rounded-full btn-modern flex items-center justify-center text-slate-300 hover:text-cyan-400 transition shadow-lg" aria-label="Pause">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
            </button>
            <button id="guide-btn" class="w-8 h-8 rounded-full btn-modern flex items-center justify-center text-slate-300 font-bold hover:text-cyan-400 transition shadow-lg" aria-label="Guide">
                ?
            </button>
        </div>

        <!-- Header -->
        <div class="text-center mb-1 sm:mb-2">
            <h1 class="text-2xl sm:text-4xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-500 font-epic mb-0 sm:mb-1 drop-shadow-lg">
                TETRIS
            </h1>
        </div>

        <!-- Score Board -->
        <div class="grid grid-cols-3 w-full mb-1 sm:mb-2 px-1 sm:px-2 gap-1 sm:gap-2">
            <div class="glass-panel px-1 py-1 sm:py-2 rounded-xl text-center">
                <span class="block text-[9px] sm:text-[10px] text-slate-400 font-epic tracking-wider">SCORE</span>
                <span id="score" class="text-lg sm:text-xl font-bold text-cyan-400 font-epic">0</span>
            </div>
            <div class="glass-panel px-1 py-1 sm:py-2 rounded-xl text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-orange-600/10 blur-xl"></div>
                <span class="block text-[9px] sm:text-[10px] text-amber-300 font-epic tracking-wider relative z-10">BEST</span>
                <span id="highscore" class="text-lg sm:text-xl font-bold text-amber-400 font-epic relative z-10">0</span>
            </div>
            <div class="glass-panel px-1 py-1 sm:py-2 rounded-xl text-center">
                <span class="block text-[9px] sm:text-[10px] text-slate-400 font-epic tracking-wider">LEVEL</span>
                <span id="level" class="text-lg sm:text-xl font-bold text-indigo-400 font-epic">1</span>
            </div>
        </div>

        <!-- Game Canvas Area -->
        <div id="game-container" class="flex-1 w-full relative flex justify-center items-center my-1 sm:my-2 min-h-0">
            <div id="game-wrapper" class="relative">
                <!-- Canvas เปลี่ยนมาใช้ class เพื่อให้ขยายเต็ม Wrapper ยืดหยุ่นได้ -->
                <canvas id="tetris" width="200" height="400" class="w-full h-full block rounded-lg bg-[#020617] shadow-[0_0_20px_rgba(99,102,241,0.2)] border border-[#6366f14d] transition-shadow duration-200"></canvas>
                
                <!-- Start / Game Over Overlay -->
                <div id="overlay" class="absolute inset-0 glass-panel rounded-lg flex flex-col items-center justify-center z-10" style="backdrop-filter: blur(5px);">
                    <div class="text-center px-4">
                        <h2 class="text-2xl font-epic font-bold text-white mb-2" id="overlay-title">READY?</h2>
                        <p id="overlay-msg" class="text-sm text-slate-300 mb-6">เปิดเสียงเพื่อความอลังการ</p>
                        <button id="start-btn" class="btn-glow px-6 py-2 rounded-full font-bold tracking-wide font-epic">
                            START
                        </button>
                    </div>
                </div>

                <!-- Pause Overlay -->
                <div id="pause-overlay" class="hidden absolute inset-0 glass-panel rounded-lg flex-col items-center justify-center z-20" style="backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.7);">
                    <div class="text-center px-4">
                        <h2 class="text-3xl font-epic font-bold text-cyan-400 mb-6 tracking-widest animate-pulse">PAUSED</h2>
                        <div class="flex flex-col gap-3">
                            <button id="resume-btn" class="btn-glow px-6 py-2 rounded-full font-bold tracking-wide font-epic">
                                RESUME
                            </button>
                            <button id="restart-pause-btn" class="btn-modern px-6 py-2 rounded-full font-bold tracking-wide font-epic text-red-400 hover:bg-red-500/20 hover:border-red-500/50">
                                RESTART
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Guide Modal -->
        <div id="guide-modal" class="hidden fixed inset-0 z-50 flex-col items-center justify-center px-4" style="backdrop-filter: blur(10px); background: rgba(15, 23, 42, 0.85);">
            <div class="glass-panel w-full max-w-sm rounded-2xl p-6 flex flex-col items-center border border-cyan-500/30 shadow-2xl shadow-cyan-500/20 text-center">
                <h2 class="text-2xl font-epic font-bold text-cyan-400 mb-6 tracking-widest">CONTROLS</h2>
                    <div class="text-sm text-slate-300 space-y-4 mb-8 text-left w-full px-4">
                        <p class="flex items-center gap-3"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg> <b class="text-base">เลื่อนซ้าย</b></p>
                        <p class="flex items-center gap-3"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg> <b class="text-base">เลื่อนขวา</b></p>
                        <p class="flex items-center gap-3"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg> <b class="text-base">หมุนบล็อก</b></p>
                        <p class="flex items-center gap-3 text-cyan-200 mt-2"><span class="font-epic tracking-widest font-bold text-lg">DROP</span>: <span class="text-base">กดค้างเพื่อลงไว</span></p>
                        <div class="mt-6 text-xs text-slate-400 border-t border-slate-700 pt-4 leading-relaxed text-center">
                            💡 หากเล่นบนคอมพิวเตอร์<br>สามารถใช้ปุ่มลูกศร ⬆️⬇️⬅️➡️ บนคีย์บอร์ดได้เลย
                        </div>
                    </div>
                <button id="close-guide-btn" class="btn-glow px-8 py-3 rounded-full font-bold tracking-widest font-epic text-sm">
                    CLOSE
                </button>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div class="grid grid-cols-3 gap-1 sm:gap-2 w-full mt-auto mb-1 px-1 md:hidden">
            <button id="btn-left" class="btn-modern h-12 rounded-xl flex items-center justify-center text-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="btn-rotate" class="btn-modern h-12 rounded-xl flex items-center justify-center text-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </button>
            <button id="btn-right" class="btn-modern h-12 rounded-xl flex items-center justify-center text-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
            <div class="col-span-3">
                <button id="btn-down" class="btn-modern h-12 w-full rounded-xl flex items-center justify-center text-lg tracking-widest font-epic">
                    DROP
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- ระบบเสียง (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // เพิ่มฟังก์ชันสร้างเสียง White Noise สำหรับเอฟเฟกต์ระเบิด
        function playNoise(duration, vol = 0.2) {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // สุ่มคลื่นเสียงให้เกิดความซ่า (Noise)
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        const sfx = {
            move: () => playTone(300, 'sine', 0.05, 0.08), // ปรับลดความดังลงมาให้ฟังสบายขึ้น
            rotate: () => playTone(450, 'square', 0.05, 0.03),
            drop: () => playTone(150, 'sawtooth', 0.1, 0.1), // เสียงกระแทกพื้น
            clear: () => {
                // เสียงสไตล์ 8-bit Level Up / เก็บไอเทม (ฟินกว่าเดิมและดูเป็นรางวัล)
                playTone(440, 'square', 0.1, 0.1);   // โน้ต A4
                setTimeout(() => playTone(554, 'square', 0.1, 0.1), 50);   // โน้ต C#5
                setTimeout(() => playTone(659, 'square', 0.1, 0.1), 100);  // โน้ต E5
                setTimeout(() => playTone(880, 'sine', 0.4, 0.15), 150);   // โน้ต A5 (หางเสียงใสๆ ปิดท้าย)
                playNoise(0.15, 0.05); // เสียงวิ้งๆ เบาๆ คล้ายประกายดาว
            },
            gameover: () => {
                playTone(300, 'sawtooth', 0.3, 0.1);
                setTimeout(() => playTone(250, 'sawtooth', 0.3, 0.1), 200);
                setTimeout(() => playTone(200, 'sawtooth', 0.6, 0.1), 400);
            }
        };

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highscore');
        const levelElement = document.getElementById('level');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayMsg = document.getElementById('overlay-msg');
        const startBtn = document.getElementById('start-btn');

        // Guide Elements
        const guideBtn = document.getElementById('guide-btn');
        const guideModal = document.getElementById('guide-modal');
        const closeGuideBtn = document.getElementById('close-guide-btn');

        // ฟังก์ชันปรับขนาดกระดานเกมให้ Responsive
        function resizeGame() {
            const container = document.getElementById('game-container');
            const wrapper = document.getElementById('game-wrapper');
            if (!container || !wrapper) return;
            
            const availableWidth = container.clientWidth;
            const availableHeight = container.clientHeight;
            
            // คำนวณขนาดที่ใหญ่ที่สุดที่เป็นไปได้โดยรักษาสัดส่วน 1:2 (กว้าง 10, สูง 20)
            const scale = Math.min(availableWidth / 10, availableHeight / 20);
            
            wrapper.style.width = (scale * 10) + 'px';
            wrapper.style.height = (scale * 20) + 'px';
        }

        window.addEventListener('resize', resizeGame);
        // รันครั้งแรกเมื่อโหลดเสร็จ
        setTimeout(resizeGame, 0);

        // Pause Elements
        const pauseBtn = document.getElementById('pause-btn');
        const pauseOverlay = document.getElementById('pause-overlay');
        const resumeBtn = document.getElementById('resume-btn');
        const restartPauseBtn = document.getElementById('restart-pause-btn');
        let isPaused = false;

        function togglePause() {
            if (gameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseOverlay.classList.remove('hidden');
                pauseOverlay.classList.add('flex');
                clearInterval(downInterval); // หยุดการลงเร็ว
            } else {
                pauseOverlay.classList.add('hidden');
                pauseOverlay.classList.remove('flex');
                lastTime = performance.now(); // รีเซ็ตเวลาเพื่อไม่ให้บล็อกร่วงรวดเดียวหลังกดเล่นต่อ
                requestAnimationFrame(update);
            }
        }

        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', togglePause);
        restartPauseBtn.addEventListener('click', () => {
            isPaused = false;
            pauseOverlay.classList.add('hidden');
            pauseOverlay.classList.remove('flex');
            startGame();
        });

        guideBtn.addEventListener('click', () => {
            if (!isPaused && !gameOver) togglePause(); // ถ้ากดดูคำแนะนำ ให้หยุดเกมด้วย
            guideModal.classList.remove('hidden'); guideModal.classList.add('flex');
        });
        closeGuideBtn.addEventListener('click', () => {
            guideModal.classList.add('hidden'); guideModal.classList.remove('flex');
        });

        // ระบบ High Score
        let highScore = localStorage.getItem('tetrisHighScore') || 0;
        highScoreElement.innerText = highScore;

        // ระบบ Particles, Screen Shake และ Floating Texts
        let particles = [];
        let floatingTexts = [];
        let shakeAmount = 0;

        function createExplosion(y) {
            shakeAmount = 8; // สั่งจอแกว่งหนักๆ
            sfx.clear();
            canvas.style.boxShadow = "0 0 40px rgba(124, 58, 237, 0.8)"; // แฟลชขอบจอ
            setTimeout(() => { canvas.style.boxShadow = "0 0 20px rgba(99, 102, 241, 0.2)"; }, 200);

            for (let x = 0; x < 10; x++) {
                const colorIndex = arena[y][x];
                if (colorIndex !== 0) {
                    const color = colors[colorIndex];
                    // กระจายอนุภาค 8 เม็ดต่อ 1 บล็อก!
                    for (let i = 0; i < 8; i++) {
                        particles.push({
                            x: x + 0.5 + (Math.random() - 0.5),
                            y: y + 0.5 + (Math.random() - 0.5),
                            vx: (Math.random() - 0.5) * 0.6,
                            vy: (Math.random() - 0.5) * 0.6 - 0.1,
                            life: 1.0 + Math.random() * 0.5,
                            color: color,
                            size: Math.random() * 0.25 + 0.05
                        });
                    }
                }
            }
        }

        function updateEffects() {
            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.01; // Gravity ดึงลงเบาๆ
                p.life -= 0.04;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update Floating Texts
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].life--;
                floatingTexts[i].y -= 0.02; // ลอยขึ้นช้าๆ
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            // Update Screen Shake (ใช้ CSS Transform แกว่งตัว Canvas)
            if (shakeAmount > 0) {
                const dx = (Math.random() - 0.5) * shakeAmount;
                const dy = (Math.random() - 0.5) * shakeAmount;
                canvas.style.transform = `translate(${dx}px, ${dy}px)`;
                shakeAmount *= 0.8; // ค่อยๆ ลดแรงสั่น
                if(shakeAmount < 0.5) {
                    shakeAmount = 0;
                    canvas.style.transform = `translate(0px, 0px)`;
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                context.globalAlpha = p.life > 1 ? 1 : p.life;
                context.fillStyle = p.color;
                
                // ใส่แสง Glow ให้สะใจ
                context.shadowBlur = 10;
                context.shadowColor = p.color;
                
                context.beginPath();
                context.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                context.fill();
            });
            context.shadowBlur = 0;
            context.globalAlpha = 1.0;
        }

        function drawFloatingTexts() {
            floatingTexts.forEach(ft => {
                context.save();
                context.globalAlpha = ft.life / ft.maxLife;
                context.fillStyle = '#67e8f9'; // สีฟ้าสว่าง
                context.shadowBlur = 5;
                context.shadowColor = '#0891b2';
                context.font = "bold 1px 'Orbitron', sans-serif";
                context.textAlign = "center";
                context.fillText(ft.text, ft.x, ft.y);
                
                // ขอบตัวอักษรให้อ่านง่ายขึ้น
                context.lineWidth = 0.05;
                context.strokeStyle = 'white';
                context.strokeText(ft.text, ft.x, ft.y);
                context.restore();
            });
        }

        // สเกลขนาดบล็อก
        context.scale(20, 20);

        // สีของบล็อก (Neon Style)
        const colors = [
            null, '#06b6d4', '#3b82f6', '#f97316', '#eab308', '#22c55e', '#a855f7', '#ef4444'
        ];

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'J') return [[0,2,0],[0,2,0],[2,2,0]];
            if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'S') return [[0,5,5],[5,5,0],[0,0,0]];
            if (type === 'T') return [[0,6,0],[6,6,6],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function draw() {
            // เคลียร์พื้นหลัง
            context.fillStyle = '#020617';
            context.fillRect(0, 0, 10, 20);

            // วาดเส้นตาราง
            context.lineWidth = 0.02;
            context.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for(let i = 0; i < 10; i++) { context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 20); context.stroke(); }
            for(let i = 0; i < 20; i++) { context.beginPath(); context.moveTo(0, i); context.lineTo(10, i); context.stroke(); }

            drawMatrix(arena, {x: 0, y: 0});
            
            if (player.matrix) {
                drawGhost(); // วาดเงาก่อน
                drawMatrix(player.matrix, player.pos); // วาดตัวจริงทับ
            }
            
            drawParticles();
            drawFloatingTexts();
        }

        // ฟังก์ชันวาดเงา (Ghost Piece)
        function drawGhost() {
            const ghost = {
                matrix: player.matrix,
                pos: { x: player.pos.x, y: player.pos.y }
            };
            // เลื่อนเงาลงไปจนกว่าจะชน
            while (!collide(arena, ghost)) {
                ghost.pos.y++;
            }
            ghost.pos.y--; // ถอยกลับมา 1 ช่องก่อนชน
            
            // วาดเงาแบบโปร่งแสง
            context.globalAlpha = 0.15;
            drawMatrix(ghost.matrix, ghost.pos, true);
            context.globalAlpha = 1.0;
        }

        function drawMatrix(matrix, offset, isGhost = false) {
            if (!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = isGhost ? '#ffffff' : colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        if (!isGhost) {
                            context.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            context.fillRect(x + offset.x, y + offset.y, 1, 0.1);
                            context.fillRect(x + offset.x, y + offset.y, 0.1, 1);
                            
                            context.fillStyle = 'rgba(0, 0, 0, 0.3)';
                            context.fillRect(x + offset.x, y + offset.y + 0.9, 1, 0.1);
                            context.fillRect(x + offset.x + 0.9, y + offset.y, 0.1, 1);
                        }
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            let linesCleared = 0;
            let scoreGained = 0;
            let textY = 0;
            
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                
                createExplosion(y);
                linesCleared++;
                if (textY === 0) textY = y; // จำตำแหน่งระเบิดเพื่อแสดงข้อความ

                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                scoreGained += rowCount * 100;
                rowCount *= 2;
            }
            
            if(linesCleared > 0) {
                shakeAmount = 8; // เขย่าจออีกรอบถ้าได้แต้ม
                player.score += scoreGained;
                
                // สุ่มคำชมตามจำนวนแถวที่เคลียร์ได้
                const compliments = ["GOOD!", "GREAT!", "AWESOME!"];
                const textStr = linesCleared >= 4 ? "TETRIS! +" + scoreGained : compliments[linesCleared - 1] + " +" + scoreGained;
                
                floatingTexts.push({
                    x: 5, // กึ่งกลางกระดานแนวนอน
                    y: textY,
                    text: textStr,
                    life: 60, // แสดงอยู่บนจอนาน 60 เฟรม
                    maxLife: 60
                });
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                sfx.drop(); // เสียงกระแทกพื้น
                shakeAmount = 2; // สั่นเบาๆ ตอนตกพื้น
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            } else {
                sfx.move(); // เสียงเลื่อน
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            sfx.rotate(); // เสียงหมุน
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerReset() {
            const pieces = 'IJLOSZT';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameOver = true;
                sfx.gameover(); // เสียง Game Over
                overlay.classList.remove('hidden');
                overlayTitle.innerText = "GAME OVER";
                overlayTitle.classList.replace('text-white', 'text-red-500');
                overlayMsg.innerHTML = `FINAL SCORE: <span class="text-cyan-400 font-bold">${player.score}</span>`;
                startBtn.innerText = "RETRY";
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameOver = true;

        function update(time = 0) {
            if (gameOver || isPaused) return; // เช็คสถานะ Pause เพิ่มเติม
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();

            updateEffects();
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            if (player.score > highScore) {
                highScore = player.score;
                localStorage.setItem('tetrisHighScore', highScore);
                highScoreElement.innerText = highScore;
            }
            let newLevel = Math.floor(player.score / 500) + 1;
            levelElement.innerText = newLevel;
            dropInterval = Math.max(100, 1000 - (newLevel * 100)); 
        }

        const arena = createMatrix(10, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        function startGame() {
            initAudio(); // ปลดล็อกและเริ่มต้นระบบเสียง
            arena.forEach(row => row.fill(0));
            player.score = 0;
            particles = [];
            floatingTexts = [];
            shakeAmount = 0;
            dropInterval = 1000;
            updateScore();
            gameOver = false;
            overlay.classList.add('hidden');
            overlayTitle.classList.replace('text-red-500', 'text-white');
            playerReset();
            update();
        }

        startBtn.addEventListener('click', startGame);

        // --- Controls ---
        document.addEventListener('keydown', event => {
            if (gameOver) return;
            if (event.keyCode === 80 || event.keyCode === 27) { togglePause(); } // กด P หรือ Esc เพื่อ Pause
            
            if (isPaused) return; // ห้ามขยับตอนเกมหยุด
            
            if (event.keyCode === 37) { playerMove(-1); }
            else if (event.keyCode === 39) { playerMove(1); }
            else if (event.keyCode === 40) { playerDrop(); }
            else if (event.keyCode === 38) { playerRotate(1); }
        });

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnRotate = document.getElementById('btn-rotate');
        const btnDown = document.getElementById('btn-down');

        function bindControl(btn, action) {
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); action(); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, { passive: false });
        }

        bindControl(btnLeft, () => { if(!gameOver && !isPaused) playerMove(-1); });
        bindControl(btnRight, () => { if(!gameOver && !isPaused) playerMove(1); });
        bindControl(btnRotate, () => { if(!gameOver && !isPaused) playerRotate(1); });

        let downInterval;
        const startDrop = (e) => { 
            e.preventDefault(); 
            if(gameOver || isPaused) return;
            playerDrop();
            clearInterval(downInterval);
            downInterval = setInterval(playerDrop, 80); 
        };
        const stopDrop = () => clearInterval(downInterval);

        btnDown.addEventListener('mousedown', startDrop);
        btnDown.addEventListener('touchstart', startDrop, { passive: false });
        window.addEventListener('mouseup', stopDrop);
        window.addEventListener('touchend', stopDrop);

        // วาดเริ่มต้น
        draw();

    </script>
</body>
</html>
